# Validation workflow for fix/nightly-e2e-override-test-stderr-a8dfa27
# Re-runs only the runtime-overrides-e2e job to verify the fix.

name: "Custom E2E: override-test-stderr"

on:
  push:
    branches:
      - fix/nightly-e2e-override-test-stderr-a8dfa27-custom-e2e

concurrency:
  group: custom-e2e-override-test-stderr-${{ github.sha }}
  cancel-in-progress: true

jobs:
  runtime-overrides-e2e:
    if: github.repository == 'gaveezy/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install NemoClaw
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: bash install.sh --non-interactive --yes-i-accept-third-party-software
      - name: Run runtime overrides E2E test
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: |
          [ -f "$HOME/.bashrc" ] && source "$HOME/.bashrc" 2>/dev/null || true
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          [ -d "$HOME/.local/bin" ] && [[ ":$PATH:" != *":$HOME/.local/bin:"* ]] && export PATH="$HOME/.local/bin:$PATH"
          bash test/e2e/test-runtime-overrides.sh
      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-overrides-test-log
          path: test-runtime-overrides-*.log
          if-no-files-found: ignore
